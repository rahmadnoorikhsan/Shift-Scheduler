name: Reshuffle Jadwal Shift

on:
  # Trigger manual dari GitHub UI (tombol "Run workflow")
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Ketik "reshuffle" untuk konfirmasi'
        required: true
        default: ''

  # Cron dinonaktifkan 2026-06-22: dulu reshuffle TIAP Minggu tanpa cek siklus,
  # menyebabkan reshuffle tak terduga (siklus 2 & 3 ke-fire sendiri) dan miscom.
  # Reshuffle sekarang manual-only via tombol "Run workflow". Untuk menghidupkan
  # lagi, kembalikan blok schedule di bawah DAN tambahkan gating tiap-5-minggu di
  # reshuffle.py lebih dulu.
  # schedule:
  #   - cron: '0 16 * * 0'

jobs:
  reshuffle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validasi konfirmasi (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "reshuffle" ]; then
            echo "❌ Konfirmasi salah. Ketik 'reshuffle' untuk melanjutkan."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Jalankan reshuffle
        run: python reshuffle.py

      - name: Commit dan push state.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/state.json
          git diff --cached --quiet || git commit -m "chore: reshuffle siklus $(python -c "import json; s=json.load(open('docs/state.json')); print(s['cycle'])")"
          git push
