<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jadwal Shift Technical Support — Daily Coverage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Warna persis dari spreadsheet (conditional formatting xlsx) */
      --s1:      #C6E0B4;  /* hijau  */
      --s2:      #FFE699;  /* kuning */
      --libur:   #F4B084;  /* oranye */
      --hari:    #B4C7E7;  /* biru   */
      --cell-text: #1f1f1f;

      --page-bg:  #e9eaec;
      --paper:    #ffffff;
      --grid:     #bfbfbf;   /* garis tabel ala Excel */
      --head-bg:  #d9d9d9;   /* baris header kolom    */
      --head-tx:  #2b2b2b;
      --band-bg:  #44546a;   /* banner "Minggu N"     */
      --band-tx:  #ffffff;
      --title-bg: #305496;
      --muted:    #5b6b7b;
    }

    body {
      font-family: Calibri, "Segoe UI", system-ui, sans-serif;
      background: var(--page-bg);
      color: #1f1f1f;
      padding: 1.5rem 1rem 3rem;
      -webkit-font-smoothing: antialiased;
    }

    .sheet {
      max-width: 1040px;
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--grid);
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
    }

    /* ---- Judul ---- */
    .title {
      background: var(--title-bg);
      color: #fff;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .02em;
      padding: 14px 12px;
    }
    .meta {
      display: flex; flex-wrap: wrap; gap: 6px 18px;
      justify-content: space-between; align-items: center;
      padding: 9px 14px; font-size: 13px; color: var(--muted);
      border-bottom: 1px solid var(--grid); background: #f7f8fa;
    }
    .meta b { color: #1f1f1f; font-weight: 700; }

    /* ---- Legenda ---- */
    .legend { display: flex; flex-wrap: wrap; gap: 8px 22px; padding: 11px 14px; font-size: 13px; border-bottom: 1px solid var(--grid); }
    .legend span { display: inline-flex; align-items: center; gap: 7px; }
    .sw { width: 26px; height: 16px; border: 1px solid rgba(0,0,0,.25); display: inline-block; }
    .sw.s1 { background: var(--s1); } .sw.s2 { background: var(--s2); } .sw.libur { background: var(--libur); }

    /* ---- Blok minggu ---- */
    .week { padding: 0 14px; }
    .week:first-of-type { padding-top: 14px; }
    .week:last-of-type  { padding-bottom: 6px; }
    .week-title {
      background: var(--band-bg); color: var(--band-tx);
      font-weight: 700; font-size: 13px; letter-spacing: .04em;
      padding: 7px 10px; margin-top: 14px;
    }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th, td { border: 1px solid var(--grid); padding: 6px 4px; font-size: 13px; text-align: center; }
    thead th { background: var(--head-bg); color: var(--head-tx); font-weight: 700; }
    th.name, td.name { width: 96px; text-align: left; padding-left: 10px; }
    td.name { font-weight: 600; background: #f2f2f2; white-space: nowrap; }
    th.hk, td.hk-cell { width: 86px; }

    /* Sel shift — warna persis spreadsheet */
    td.cell { color: var(--cell-text); font-weight: 600; }
    td.cell.s1    { background: var(--s1); }
    td.cell.s2    { background: var(--s2); }
    td.cell.libur { background: var(--libur); }
    td.hk-cell    { background: var(--hari); color: var(--cell-text); }

    /* ---- Riwayat & info ---- */
    .extra { padding: 4px 14px 16px; }
    .section-h { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin: 16px 0 8px; }
    .hist-row { font-size: 13px; padding: 5px 0; border-bottom: 1px solid #eee; display: flex; gap: 10px; }
    .hist-row:last-child { border-bottom: none; }
    .hist-c { font-weight: 700; min-width: 70px; }
    .info {
      background: #eef3fb; border: 1px solid #c5d6ef; border-left: 3px solid var(--title-bg);
      padding: 11px 13px; margin: 16px 14px; font-size: 13px; color: #234; line-height: 1.5;
    }
    .info code { background: #dfe7f3; padding: 1px 5px; border-radius: 3px; }

    .state { padding: 3rem 1rem; text-align: center; color: var(--muted); font-size: 14px; }
    .err { color: #8a1f1f; background: #fbeaea; border: 1px solid #e3b7b7; margin: 14px; padding: 12px 14px; border-radius: 4px; font-size: 13px; }

    @media (max-width: 640px) {
      th, td { font-size: 11px; padding: 5px 2px; }
      th.name, td.name { width: 64px; padding-left: 6px; }
      th.hk, td.hk-cell { width: 56px; }
      .title { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="sheet">
    <div class="title">JADWAL SHIFT TECHNICAL SUPPORT — FULL COVERAGE</div>
    <div id="app"><div class="state">Memuat jadwal…</div></div>
  </div>

<script>
const DAYS  = ['Sen','Sel','Rab','Kam','Jum','Sab','Min'];
const WEEKS = ['Minggu 1','Minggu 2','Minggu 3','Minggu 4','Minggu 5'];

// Pola shift per posisi (seat) -> [posisi][minggu][hari]. Sumber: sheet
// "Shift Weekend Coverage (5P)". Personil dipetakan ke posisi via order di state.json.
const PATTERN = [
  [["S2","S2","S2","LIBUR","S1","LIBUR","S1"],["S1","S1","S1","S1","LIBUR","S2","LIBUR"],["LIBUR","S1","S1","S1","S1","S1","LIBUR"],["S1","LIBUR","S2","S2","S2","S2","LIBUR"],["S2","S2","LIBUR","S2","S2","LIBUR","S2"]],
  [["S1","S1","S1","S1","LIBUR","S2","LIBUR"],["LIBUR","S1","S1","S1","S1","S1","LIBUR"],["S1","LIBUR","S2","S2","S2","S2","LIBUR"],["S2","S2","LIBUR","S2","S2","LIBUR","S2"],["S2","S2","S2","LIBUR","S1","LIBUR","S1"]],
  [["LIBUR","S1","S1","S1","S1","S1","LIBUR"],["S1","LIBUR","S2","S2","S2","S2","LIBUR"],["S2","S2","LIBUR","S2","S2","LIBUR","S2"],["S2","S2","S2","LIBUR","S1","LIBUR","S1"],["S1","S1","S1","S1","LIBUR","S2","LIBUR"]],
  [["S1","LIBUR","S2","S2","S2","S2","LIBUR"],["S2","S2","LIBUR","S2","S2","LIBUR","S2"],["S2","S2","S2","LIBUR","S1","LIBUR","S1"],["S1","S1","S1","S1","LIBUR","S2","LIBUR"],["LIBUR","S1","S1","S1","S1","S1","LIBUR"]],
  [["S2","S2","LIBUR","S2","S2","LIBUR","S2"],["S2","S2","S2","LIBUR","S1","LIBUR","S1"],["S1","S1","S1","S1","LIBUR","S2","LIBUR"],["LIBUR","S1","S1","S1","S1","S1","LIBUR"],["S1","LIBUR","S2","S2","S2","S2","LIBUR"]],
];

const cls       = s => s === 'S1' ? 's1' : s === 'S2' ? 's2' : 'libur';
const workdays  = row => row.filter(s => s !== 'LIBUR').length;

function legend() {
  return `<div class="legend">
    <span><i class="sw s1"></i> S1 · 06:00–14:00</span>
    <span><i class="sw s2"></i> S2 · 13:00–21:00</span>
    <span><i class="sw libur"></i> LIBUR · OFF</span>
  </div>`;
}

function weekTable(order, wi) {
  const head = `<tr><th class="name">Personil</th>${DAYS.map(d => `<th>${d}</th>`).join('')}<th class="hk">Hari Kerja</th></tr>`;
  const body = order.map((name, pi) => {
    const row = PATTERN[pi % PATTERN.length][wi];
    const cells = row.map(s => `<td class="cell ${cls(s)}">${s}</td>`).join('');
    return `<tr><td class="name">${name}</td>${cells}<td class="hk-cell">${workdays(row)} hari</td></tr>`;
  }).join('');
  return `<div class="week"><div class="week-title">${WEEKS[wi]}</div>
    <table><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

function render(state) {
  const { cycle, order, history, last_reshuffled } = state;
  const dateStr = last_reshuffled
    ? new Date(last_reshuffled).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })
    : 'Belum pernah';

  let html = `<div class="meta">
      <span>Siklus aktif: <b>${cycle}</b></span>
      <span>Urutan: <b>${order.join(' → ')}</b></span>
      <span>Terakhir diacak: <b>${dateStr}</b></span>
    </div>`;
  html += legend();

  for (let wi = 0; wi < WEEKS.length; wi++) html += weekTable(order, wi);

  if (history && history.length > 1) {
    html += `<div class="extra"><div class="section-h">Riwayat reshuffle</div>` +
      history.map(h => `<div class="hist-row"><span class="hist-c">Siklus ${h.cycle}</span><span>${h.order.join(' → ')}</span></div>`).join('') +
      `</div>`;
  }

  html += `<div class="info"><strong>Cara reshuffle:</strong> buka repo GitHub →
    tab <em>Actions</em> → workflow <em>Reshuffle Jadwal Shift</em> →
    <em>Run workflow</em> → ketik <code>reshuffle</code> → konfirmasi.
    Halaman ini otomatis diperbarui ~1 menit setelah workflow selesai (atau saat di-refresh).</div>`;

  document.getElementById('app').innerHTML = html;
}

async function loadState() {
  try {
    const res = await fetch('state.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    render(await res.json());
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="err">Gagal memuat state.json: ${e.message}</div>`;
  }
}

loadState();
// Auto-refresh tiap 5 menit (berguna bila halaman dibiarkan terbuka saat Actions jalan)
setInterval(loadState, 5 * 60 * 1000);
</script>
</body>
</html>
